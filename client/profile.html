<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/assets/moustache-favicon-180x180.png" />
    <title>Beardington - Your Profile</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <header class="top-nav-div">
      <nav id="navbar">
        <div class="nav-section left">
          <a href="/" data-link>Home</a>
          <a href="/products" data-link>Products</a>
        </div>
        <div class="logo">
          <a href="/" data-link>
            <img src="/assets/Moustache-favicon-230x230.png" alt="Beardington" />
          </a>
        </div>
        <div class="nav-section right">
          <a href="/profile" data-link>
            <img
              src="/assets/shopping_icon-icons.com.webp"
              alt="shopping-bag"
              class="shopping-bag"
              style="width: 25px"
            />
          </a>
          <span class="profile-link">
            <a href="/profile" data-link>Profile</a>
          </span>
        </div>
      </nav>
    </header>

    



    <footer>
      <div>
        <div class="footer-nav-container">
          <nav class="footer-nav">
            <a href="#">Terms of Service</a>
            <a href="#">Terms and Conditions</a>
            <a href="#">Privacy Policy</a>
          </nav>
        </div>
        <div>
          <p class="footer-text">
            Copyright © <span class="display-year"></span>
            <strong>Beardington</strong>. All rights reserved.
          </p>
          <script>
            document.querySelector(".display-year").textContent =
              new Date().getFullYear();
          </script>
        </div>
      </div>
    </footer>
  </body>
</html>
