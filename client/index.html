<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <link rel="icon" href="/assets/moustache-favicon-180x180.png" />
    <title>Beardington Products Listing</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <header class="top-nav-div">
      <nav id="navbar">
        <div class="nav-section left">
          <a href="/" data-link>Home</a>
          <a href="/products" data-link>Products</a>
        </div>

        <div class="logo">
          <a href="/" data-link>
            <img
              src="/assets/Moustache-favicon-230x230.png"
              alt="Beardington"
            />
          </a>
        </div>

        <div class="nav-section right">
          <a href="/cart" data-link>
            <img
              src="/assets/shopping_icon-icons.com.webp"
              alt="shopping-bag"
              class="shopping-bag"
              style="width: 25px"
            />
          </a>
          <span class="profile-link">
            <a href="/profile" data-link>Profile</a>
          </span>
        </div>
      </nav>
    </header>

    <main id="app"></main>

    <script src="/js/app.js" type="module"></script>
    <script>
      console.log("hello from inline");
    </script>

    <script>
      const navigateTo = (url) => {
        history.pushState(null, null, url);
        document.dispatchEvent(new Event("navigate"));
      };

      window.addEventListener("popstate", () => {
        document.dispatchEvent(new Event("navigate"));
      });

      document.addEventListener("DOMContentLoaded", () => {
        document.body.addEventListener("click", (e) => {
          const link = e.target.closest("[data-link]");
          if (link) {
            e.preventDefault();
            navigateTo(link.href);
          }
        });
      });
    </script>

    <footer>
      <div>
        <div class="footer-nav-container">
          <nav class="footer-nav">
            <a href="#"> Terms of Service </a>
            <a href="#"> Terms and Conditions </a>
            <a href="#"> Privacy Policy </a>
          </nav>
        </div>
        <div>
          <p class="footer-text">
            Copyright © <span class="display-year"></span> <strong>Beardington</strong>. All
            rights reserved.
          </p>
          <script>
            const currentYear = new Date().getFullYear();
            const yearElement = document.querySelector(".display-year");
            yearElement.textContent = currentYear;
          </script>
        </div>
      </div>
    </footer>
  </body>
</html>
